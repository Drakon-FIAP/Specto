<!DOCTYPE html>
<html lang="pt-br">

    <link rel="stylesheet" href="assets/css/style.css">
    <title>Specto</title>
</head>
<body>
    <div class="theme-switcher">
        <input type="radio" id="tema1" name="tema" checked>
        <label for="tema1">Space</label>

        <input type="radio" id="tema2" name="tema">
        <label for="tema2">Light</label>

        <input type="radio" id="tema3" name="tema">
        <label for="tema3">Purple</label>
    </div>
    <div class="container">
        <div class="title-i">SPECTO</div>

        <h1 class="subtitle-i">O dado que estava no espaço.</h1>
        <h1 class="subtitle2-i">O laudo que chegou até você.</h1>

        <p class="description">
            Transformamos imagens de satélite em informações acessíveis para produtores,
            gestores públicos e organizações que precisam tomar decisões com confiança.
        </p>

        <div class="buttons">
            <button class="btn-primary">Gerar meu laudo</button>
            <button class="btn-secondary">Ver demonstração</button>
        </div>

    </div>

<script src="assets/scripts/script.js"></script>
